<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustGuard Canada | Book Now</title>
  <meta http-equiv="refresh" content="4; url=https://YOUR-BOOKING-LINK-HERE.com" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #ffffff, #f6f8fb);
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      padding: 40px 30px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
    }

    h1 {
      font-size: 2.3rem;
      color: #0f172a;
      margin-bottom: 14px;
    }

    p {
      color: #6b7280;
      margin-bottom: 20px;
      font-size: 1.03rem;
    }

    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      padding: 14px 22px;
      border-radius: 10px;
      font-weight: 700;
      text-decoration: none;
      margin-top: 8px;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .small {
      font-size: 0.92rem;
      margin-top: 16px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Redirecting to Booking</h1>
    <p>
      You are being redirected to our booking page. If nothing happens, click the button below.
    </p>

    <a class="btn" href="https://YOUR-BOOKING-LINK-HERE.com">Continue to Booking</a>

    <p class="small">
      Replace <strong>https://YOUR-BOOKING-LINK-HERE.com</strong> in this file with your Yelp, Calendly,
      or any booking app link.
    </p>
  </div>
</body>
</html>
